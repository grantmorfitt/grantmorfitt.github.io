<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="/assets/style.css">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grant Morfitt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #0a0000;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* === DOOM FLAME CANVAS === */
    #flame-canvas {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Dark gradient overlay so content stays readable */
    #flame-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(5, 0, 0, 0.80) 0%,
        rgba(5, 0, 0, 0.50) 55%,
        rgba(5, 0, 0, 0.08) 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* === MAIN CARD === */
    main {
      position: relative;
      z-index: 2;
      max-width: 700px;
      width: 100%;
      background: rgba(10, 2, 0, 0.82);
      padding: 40px 30px;
      border-radius: 14px;
      border: 1px solid #441100;
      box-shadow: 0 0 40px rgba(255, 60, 0, 0.15), 0 6px 16px rgba(0,0,0,0.6);
      text-align: center;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: 2.8rem;
      color: #ff6600;
      text-shadow: 0 0 10px #ff2200, 0 0 2px #ffaa00;
    }

    p.lead {
      margin: 0 0 20px;
      font-size: 1.15rem;
      color: #cc7744;
    }

    /* === CONTACT BAR === */
    .contact-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      margin: 12px auto 28px;
      padding: 0 10px;
      gap: 6px;
      font-size: 0.9rem;
      color: #bb8866;
    }

    .contact-bar a {
      color: #ff8833;
      text-decoration: none;
    }

    .contact-bar a:hover {
      color: #ffcc66;
    }

    .contact-bar .sep {
      color: #441100;
      padding: 0 4px;
    }

    /* === BUTTONS === */
    .btn {
      display: inline-block;
      background: linear-gradient(90deg, #cc2200, #330000);
      color: #ffe0b0;
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(200, 40, 0, 0.4);
      border: 1px solid #661100;
      transition: background 0.2s ease, box-shadow 0.2s ease;
      margin: 5px;
    }

    .btn:hover {
      background: linear-gradient(90deg, #ff3300, #550000);
      box-shadow: 0 6px 18px rgba(255, 60, 0, 0.55);
      color: #fff8e0;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    /* === FOOTER === */
    footer {
      position: relative;
      z-index: 2;
      margin-top: 32px;
      font-size: 0.9rem;
      color: #553322;
      text-align: center;
    }
  </style>
</head>
<body>

  <canvas id="flame-canvas"></canvas>
  <div id="flame-overlay"></div>

  <main>
    <img
      src="assets/avatar.png"
      alt="Grant Morfitt"
      style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 20px rgba(255,80,0,0.4), 0 4px 12px rgba(0,0,0,0.5);"
    />
    <h1>Grant Morfitt</h1>
    <p class="lead">Fire Safety Research Engineer</p>

    <div class="contact-bar">
      <span>Email: <a href="mailto:grant.e.morfitt@faa.gov">grant.e.morfitt@faa.gov</a></span>
      <span class="sep">|</span>
      <span>Phone: (609) 485-6509</span>
      <span class="sep">|</span>
      <span>William J. Hughes Technical Center</span>
    </div>

    <div class="button-container">
      <a href="/wiki/" class="btn">Wiki</a>
      <a href="https://github.com/grantmorfitt" class="btn">GitHub</a>
      <a href="https://www.linkedin.com/in/grant-morfitt/" class="btn">LinkedIn</a>
      <a href="/publications/" class="btn">Publications</a>
    </div>
  </main>

  <footer>
    &copy; 2026 Grant Morfitt
  </footer>

  <script>
    // === DOOM-STYLE 8-BIT FLAME ALGORITHM ===
    const canvas = document.getElementById('flame-canvas');
    const ctx = canvas.getContext('2d');

    const palette = [
      [0,0,0],[7,0,0],[15,0,0],[23,0,0],[31,0,0],[39,0,0],[47,0,0],
      [55,0,0],[63,0,0],[71,0,0],[79,0,0],[87,0,0],[95,0,0],[103,0,0],
      [111,0,0],[119,0,0],[127,0,0],[135,7,0],[143,15,0],[151,23,0],
      [159,31,0],[167,39,0],[175,47,0],[183,55,0],[191,63,0],[199,71,0],
      [207,79,0],[215,87,0],[223,95,0],[231,103,0],[239,111,0],[247,119,0],
      [255,127,0],[255,135,7],[255,143,15],[255,151,23],[255,159,31],
      [255,167,39],[255,175,47],[255,183,55],[255,191,63],[255,199,71],
      [255,207,79],[255,215,87],[255,223,95],[255,231,103],[255,239,111],
      [255,247,119],[255,255,127],[255,255,143],[255,255,159],[255,255,175],
      [255,255,191],[255,255,207],[255,255,223],[255,255,239],[255,255,255]
    ];

    const PIXEL = 8;
    let cols, rows, fire;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.ceil(canvas.width  / PIXEL);
      rows = Math.ceil(canvas.height / PIXEL);
      fire = new Uint8Array(cols * rows);
      for (let x = 0; x < cols; x++) {
        fire[(rows - 1) * cols + x] = palette.length - 1;
      }
    }

    function spread() {
      for (let y = 0; y < rows - 1; y++) {
        for (let x = 0; x < cols; x++) {
          const below = fire[(y + 1) * cols + x];
          if (below === 0) {
            fire[y * cols + x] = 0;
          } else {
            const decay = Math.floor(Math.random() * 3);
            const drift = Math.floor(Math.random() * 3) - 1;
            const nx    = Math.max(0, Math.min(cols - 1, x - drift));
            fire[y * cols + nx] = Math.max(0, below - decay);
          }
        }
      }
    }

    function draw() {
      const imgData = ctx.createImageData(canvas.width, canvas.height);
      const d = imgData.data;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const val = fire[y * cols + x];
          const [r, g, b] = palette[Math.min(val, palette.length - 1)];
          for (let py = 0; py < PIXEL; py++) {
            const ry = y * PIXEL + py;
            if (ry >= canvas.height) continue;
            for (let px = 0; px < PIXEL; px++) {
              const rx = x * PIXEL + px;
              if (rx >= canvas.width) continue;
              const i = (ry * canvas.width + rx) * 4;
              d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = 255;
            }
          }
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }

    window.addEventListener('resize', resize);
    resize();

    (function loop() {
      spread();
      draw();
      setTimeout(() => requestAnimationFrame(loop), 80);
    })();
  </script>

</body>
</html>
